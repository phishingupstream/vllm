model: Qwen/Qwen3-14B-FP8
served-model-name:
  - qwen3-14b
  - default
host: "0.0.0.0"
port: 8000
trust-remote-code: true

# Attention backend
attention-config: '{"backend": "FLASHINFER"}'

# Compilation - patched vLLM to handle NVIDIA PyTorch builds
# enforce-eager: true  # Uncomment to disable compilation if issues occur
# Capture sizes aligned with max-num-seqs (64)
compilation-config: '{"mode": "VLLM_COMPILE", "cudagraph_mode": "FULL_AND_PIECEWISE", "cudagraph_capture_sizes": [1,2,4,8,16,32,64]}'

# Memory
gpu-memory-utilization: 0.95
max-model-len: 32768

# Scheduling - optimized for higher throughput
enable-chunked-prefill: true
async-scheduling: true
max-num-seqs: 64
max-num-batched-tokens: 32768

# LMCache KV offloading (disabled due to cache corruption issues)
# kv-transfer-config: '{"kv_connector":"LMCacheConnectorV1","kv_role":"kv_both"}'
enable-prefix-caching: true

# Tool calling
enable-auto-tool-choice: true
tool-call-parser: hermes

# Disable Qwen3 thinking mode (removes <think>...</think> blocks from responses)
default-chat-template-kwargs: '{"enable_thinking": false}'

# Logging
enable-log-requests: true
disable-uvicorn-access-log: true
uvicorn-log-level: warning

# Native vLLM OTEL tracing disabled — the LangfuseTracerMiddleware handles
# all tracing to both Langfuse and OpenLIT with correct attribute names.

# OTEL tracing middleware — exports traces to SigNoz
middleware:
  - "plugins.otel_tracer.OtelTracerMiddleware"
