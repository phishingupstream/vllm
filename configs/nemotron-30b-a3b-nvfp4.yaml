model: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-NVFP4
served-model-name:
  - nemotron-30b
  - default
host: "0.0.0.0"
port: 8000
trust-remote-code: true

# Attention backend - FlashInfer required for NVFP4 MoE
attention-config: '{"backend": "FLASHINFER"}'

# Compilation - full cudagraphs for performance
compilation-config: '{"mode": "VLLM_COMPILE", "cudagraph_mode": "FULL_AND_PIECEWISE", "cudagraph_capture_sizes": [1,2,4,8]}'

# Memory - optimized for 32GB VRAM (RTX 5090)
# Model: 18.5GB weights. Only 6/52 layers use KV cache (Mamba hybrid).
# KV cache: 3 KB/token (FP8). vLLM reports ~588K tokens available at 93% util.
# 256K context x 2 seqs = 524K tokens, 89% of pool with 11% headroom.
gpu-memory-utilization: 0.93
max-model-len: 262144
kv-cache-dtype: fp8

# Scheduling
enable-chunked-prefill: true
async-scheduling: true
max-num-seqs: 2
max-num-batched-tokens: 16384

# Prefix caching - DISABLED: causes garbled output with NVFP4 quantization
# When enabled, certain large prompts (~17K tokens) produce corrupted text
# This appears to be a bug with FlashInfer + NVFP4 + prefix caching
# TODO: Re-test after vLLM updates, file upstream bug report
enable-prefix-caching: false

# Tool calling - qwen3_coder is correct for this model (generates <tool_call> XML, not <TOOLCALL>)
# The custom nemotron_json parser is for Nemotron v2 format, not this Qwen3-based model
enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

# Reasoning - custom nano_v3 parser for proper enable_thinking toggle in streaming
reasoning-parser-plugin: ~/projects/vllm/parsers/nano_v3_reasoning_parser.py
reasoning-config: '{"reasoning_start_str": "<think>", "reasoning_end_str": "</think>"}'
default-chat-template-kwargs: '{"enable_thinking": true}'
structured-outputs-config: '{"reasoning_parser": "nano_v3"}'

# Logging
enable-log-requests: true
disable-uvicorn-access-log: true
uvicorn-log-level: warning

# OTEL tracing middleware — exports traces to SigNoz
middleware:
  - "plugins.otel_tracer.OtelTracerMiddleware"
