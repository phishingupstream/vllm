# IMPORTANT: First read the model documentation: https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-9B-v2-NVFP4
# Summary:
# NVIDIA-Nemotron-Nano-9B-v2-NVFP4 is a quantized version of NVIDIA-Nemotron-Nano-9B-v2 (https://huggingface.co/nvidia/NVIDIA-Nemotron-Nano-9B-v2) and is a large language model (LLM) trained from scratch by NVIDIA, and designed as a unified model for both reasoning and non-reasoning tasks. It responds to user queries and tasks by first generating a reasoning trace and then concluding with a final response. The model's reasoning capabilities can be controlled via a system prompt. If the user prefers the model to provide its final answer without intermediate reasoning traces, it can be configured to do so, albeit with a slight decrease in accuracy for harder prompts that require reasoning. Conversely, allowing the model to generate reasoning traces first generally results in higher-quality final solutions to queries and tasks.

model: nvidia/NVIDIA-Nemotron-Nano-9B-v2-NVFP4
served-model-name:
  - nemotron-nano-9b
  - default
mamba-ssm-cache-dtype: float16
host: "0.0.0.0"
port: 8000
allowed-local-media-path: "/data"

# Logging - requests and final outputs (not per-token streaming)
enable-log-requests: true
enable-log-outputs: true
disable-uvicorn-access-log: true
uvicorn-log-level: "warning"
trust-remote-code: True

# Compilation - CUDA graphs for low concurrency
compilation-config: '{"mode": "VLLM_COMPILE", "cudagraph_mode": "FULL_AND_PIECEWISE", "cudagraph_capture_sizes": [1,2,4,8,16]}'

# Attention - v0.14 syntax
attention-config: '{"backend": "FLASHINFER"}' 

# Scheduling - optimized for low latency
enable-chunked-prefill: true
enable-prefix-caching: false  # DISABLED: Mamba prefix caching is experimental and causes garbage output (vLLM #26201)
async-scheduling: true
stream-interval: 1

# Memory tuning - optimized for 1-10 concurrent users
max-num-seqs: 16
max-num-batched-tokens: 4096
gpu-memory-utilization: 0.90

# Context length
max-model-len: 32768

# Tool calling
enable-auto-tool-choice: true
tool-parser-plugin: "~/projects/vllm/parsers/nemotron_toolcall_parser_streaming.py"
tool-call-parser: "nemotron_json"

# Ngram speculation (disabled - may conflict with async scheduling)
#speculative-config: '{"method": "ngram", "num_speculative_tokens": 4, "prompt_lookup_max": 4}'

# OTEL tracing middleware — exports traces to SigNoz
middleware:
  - "plugins.otel_tracer.OtelTracerMiddleware"
