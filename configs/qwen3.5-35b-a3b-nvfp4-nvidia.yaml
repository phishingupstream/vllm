# Nvidia's official NVFP4 quantization of Qwen3.5-35B-A3B (txn545)
# Testing against Kbenkhaled version for quality comparison
model: txn545/Qwen3.5-35B-A3B-NVFP4
served-model-name:
  - qwen3.5-35b
  - default
host: "0.0.0.0"
port: 8000
trust-remote-code: true

# Qwen3.5 DeltaNet hybrid attention (30 DeltaNet + 10 Attention layers)
attention-config: '{"backend": "FLASHINFER"}'
mm-encoder-attn-backend: TORCH_SDPA
compilation-config: '{"mode": "VLLM_COMPILE", "cudagraph_mode": "FULL_AND_PIECEWISE", "cudagraph_capture_sizes": [1,2], "fast_moe_cold_start": false}'

# v0.19 memory profiling regression: profile_run() triggers DeltaNet Triton
# autotuner which allocates ~6 GiB transient workspace. v0.19 records the PEAK
# as permanent overhead, leaving negative KV budget. v0.18 measured AFTER the
# workspace was freed. Fix: bypass profiling with explicit kv-cache-memory-bytes.
# Value matches v0.18 steady-state (3.08 GiB KV cache at 0.86 util).
gpu-memory-utilization: 0.86
kv-cache-memory-bytes: 3221225472
max-model-len: 262144
kv-cache-dtype: fp8

enable-prefix-caching: false
enable-chunked-prefill: true
async-scheduling: true
# Workload sweep 2026-03-13: seqs=2 is optimal — 45% more throughput, 6x better TTFT,
# only 37% TPOT increase (8.3ms vs 6.1ms). DeltaNet penalty cliff at seqs=4+ (32ms TPOT).
max-num-seqs: 2
max-num-batched-tokens: 8192

# Tool calling
enable-auto-tool-choice: true
tool-call-parser: qwen3_coder

# Thinking mode
# Official Qwen recommended sampling (temp, top_p, top_k).
# NOTE: Qwen recommends presence_penalty=1.5 for general use, but pp>=0.6
# corrupts structured output / tool calling JSON. Use pp=0.4 max with tools.
# Loop prevention handled by thinking_token_budget instead of penalty.
reasoning-parser: qwen3
reasoning-config: '{"reasoning_start_str": "<think>", "reasoning_end_str": "</think>"}'
default-chat-template-kwargs: '{"enable_thinking": true}'
override-generation-config: '{"temperature": 1.0, "top_p": 0.95, "top_k": 20, "presence_penalty": 0.4}'

# Multimodal
limit-mm-per-prompt: '{"image": 4, "video": 1}'
allowed-local-media-path: "/data"

# Thinking budget: v0.19 native thinking_token_budget replaces custom logits processor.
# Budget set via {"thinking_token_budget": N} or {"reasoning_effort": "low/medium/high"}.
# Default: medium (8192 tokens) via fix_reasoning_effort_budget_defaults patch.

# OTEL tracing middleware — captures prompt/completion content for OpenLIT + Langfuse
middleware:
  - "plugins.otel_tracer.OtelTracerMiddleware"

# Logging
enable-log-requests: true
disable-uvicorn-access-log: true
uvicorn-log-level: warning

# Native vLLM OTEL tracing disabled — the LangfuseTracerMiddleware handles
# all tracing to both Langfuse and OpenLIT with correct attribute names.
